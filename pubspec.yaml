name: businessmindset
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.13.3+31

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.2.0
  firebase_database: ^12.0.3
  firebase_crashlytics: ^5.0.3
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  bottom_picker: ^4.1.1
  animations: ^2.1.0
  firebase_auth: ^6.1.4
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.6
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  image_picker: ^1.2.0
  flex_color_picker: ^3.7.2
  flutter_local_notifications: ^17.1.2
  path_provider: ^2.1.5
  path: ^1.9.0
  timezone: ^0.9.2
  flutter_timezone: ^4.1.1
  purchases_flutter: ^8.10.5
  mixpanel_flutter: ^2.4.4
  tiktok_events_sdk: ^1.1.3
  crop_your_image: ^1.0.1
  image: ^4.3.0
  firebase_remote_config: ^6.3.0
  flutter_dotenv: ^5.2.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0

# Launcher icons and splash screens are maintained by hand on both
# platforms — no flutter_launcher_icons / flutter_native_splash plugin.
#
# Android:
#   - icons: `android/app/src/main/res/mipmap-*dpi/ic_launcher.png`
#            + `mipmap-anydpi-v26/ic_launcher.xml` for the adaptive icon.
#   - splash (pre-12): `drawable/launch_background.xml` (layer-list with
#     `@drawable/background` + centered `@drawable/splash`) applied via
#     `LaunchTheme` in `values/styles.xml`.
#   - splash (API 31+): `values-v31/styles.xml` sets
#     `windowSplashScreenBackground="#1f1f1f"` and
#     `windowSplashScreenAnimatedIcon="@drawable/android12splash"`.
#
# iOS:
#   - icons: `ios/Runner/Assets.xcassets/AppIcon.appiconset/`.
#   - splash: `ios/Runner/Base.lproj/LaunchScreen.storyboard` references
#     the `FlamySplash` image set (same PNG as the Android splash).
#
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

  # The following section is specific to Flutter packages.
flutter:
  config:
    enable-lldb-debugging: false

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/backgrounds/
    - assets/images/flamy/
    # Loaded at runtime by lib/config/env.dart via flutter_dotenv. The file is
    # gitignored; bundle the developer's local copy into the build assets.
    - .env
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: InterTight
      fonts:
        - asset: assets/fonts/interTight/InterTight-Regular.ttf
          weight: 400
        - asset: assets/fonts/interTight/InterTight-Medium.ttf
          weight: 500
        - asset: assets/fonts/interTight/InterTight-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/interTight/InterTight-Bold.ttf
          weight: 700
        - asset: assets/fonts/interTight/InterTight-Italic.ttf
          style: italic
    - family: YesevaOne
      fonts:
        - asset: assets/fonts/Yeseva/YesevaOne.ttf
    - family: DidactGothic
      fonts:
        - asset: assets/fonts/DidactGothic/DidactGothic-Regular.ttf
    - family: JosefinSlab
      fonts:
        - asset: assets/fonts/JosefinSlab/JosefinSlab-Regular.ttf
    - family: Raleway
      fonts:
        - asset: assets/fonts/Raleway/Raleway-Regular.ttf
    - family: AbhayaLibre
      fonts:
        - asset: assets/fonts/AbhayaLibre/AbhayaLibre-Regular.ttf
    - family: Allerta
      fonts:
        - asset: assets/fonts/Allerta/Allerta-Regular.ttf
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue/BebasNeue-Regular.ttf
    - family: BodoniModa
      fonts:
        - asset: assets/fonts/BodoniModa/BodoniModa_18pt-Regular.ttf
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond/CormorantGaramond-Regular.ttf
    - family: EBGaramond
      fonts:
        - asset: assets/fonts/EBGaramond/EBGaramond-Regular.ttf
    - family: JosefinSans
      fonts:
        - asset: assets/fonts/JosefinSans/JosefinSans-Regular.ttf
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato/Lato-Regular.ttf
    - family: LibreBaskerville
      fonts:
        - asset: assets/fonts/LibreBaskerville/LibreBaskerville-Regular.ttf
    - family: Lustria
      fonts:
        - asset: assets/fonts/Lustria/Lustria-Regular.ttf
    - family: MontSerrat
      fonts:
        - asset: assets/fonts/Montserrat/Montserrat-Regular.ttf
    - family: Oranlenbaum
      fonts:
        - asset: assets/fonts/Oranlenbaum/Oranienbaum-Regular.ttf
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald/Oswald-Regular.ttf
    - family: Ovo
      fonts:
        - asset: assets/fonts/Ovo/Ovo-Regular.ttf
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay/PlayfairDisplay-Regular.ttf
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand/Quicksand-Regular.ttf
    - family: Sanchez
      fonts:
        - asset: assets/fonts/Sanchez/Sanchez-Regular.ttf
    - family: SourceSansPro
