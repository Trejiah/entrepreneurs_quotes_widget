        - asset: assets/fonts/SourceSansPro/SourceSansPro-Regular.ttf
    - family: Volkorn
      fonts:
        - asset: assets/fonts/Volkorn/Volkhov-Regular.ttf

  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
